<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Graph of x(y)</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #16181d;
      --muted: #667085;
      --line: #d7dde8;
      --accent: #2f63ff;
      --grid: rgba(72, 82, 104, 0.28);
      --minor-grid: rgba(72, 82, 104, 0.16);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(1200px, calc(100% - 24px));
      margin: 12px auto;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 14px 42px rgba(20, 24, 38, 0.08);
      overflow: hidden;
    }
    header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--line);
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(20px, 2.7vw, 34px);
      line-height: 1.15;
    }
    .formula {
      margin: 0;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      color: #111827;
      font-family: "Cambria Math", "STIX Two Math", "Times New Roman", serif;
      font-size: clamp(22px, 2.8vw, 34px);
      line-height: 1.18;
    }
    .frac {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      vertical-align: middle;
      line-height: 1;
      margin: 0 1px;
    }
    .frac .top {
      border-bottom: 1.5px solid currentColor;
      padding: 0 0.18em 0.06em;
    }
    .frac .bottom {
      padding: 0.04em 0.18em 0;
    }
    .bracket {
      font-size: 1.05em;
      line-height: 1;
      position: relative;
      top: 0.01em;
    }
    .controls {
      display: grid;
      grid-template-columns: repeat(5, minmax(130px, 1fr));
      gap: 10px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--line);
      align-items: end;
    }
    label {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }
    .param-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .param-value {
      color: var(--text);
      font-variant-numeric: tabular-nums;
      font-weight: 700;
    }
    .mobile-range { display: none; }
    input[type="range"] {
      width: 100%;
      margin: 0;
      accent-color: var(--accent);
      cursor: pointer;
    }
    input[type="number"] {
      width: 100%;
      min-width: 0;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--text);
      font: inherit;
      font-size: 14px;
      outline: none;
    }
    input[type="number"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(47, 99, 255, 0.14);
    }
    .dense-wrap { min-width: 0; }
    .checklabel {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 38px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
    }
    .checklabel input[type="checkbox"] {
      width: 16px;
      height: 16px;
      margin: 0;
      accent-color: var(--accent);
      cursor: pointer;
      flex: 0 0 auto;
    }
    .plot-wrap {
      position: relative;
      height: min(68vh, 690px);
      min-height: 420px;
      padding: 10px;
    }
    canvas {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 12px;
      cursor: crosshair;
      touch-action: none;
      background: #fff;
    }
    .tooltip {
      position: absolute;
      display: none;
      pointer-events: none;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 9px;
      background: rgba(255,255,255,0.96);
      box-shadow: 0 8px 22px rgba(0,0,0,.12);
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      transform: translate(12px, -50%);
    }
    .note {
      padding: 0 20px 16px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }
    .note a {
      color: var(--accent);
      font-weight: 650;
      text-decoration: none;
    }
    .note a:hover { text-decoration: underline; }
    @media (max-width: 860px) {
      .controls { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
    @media (max-width: 760px) {
      main { width: min(100%, calc(100% - 12px)); margin: 6px auto; }
      .card { border-radius: 14px; }
      header { padding: 14px 14px 10px; }
      h1 { margin-bottom: 6px; font-size: 18px; }
      .formula {
        gap: 4px;
        font-size: 16px;
        line-height: 1.06;
      }
      .controls {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 7px 10px;
        padding: 9px 12px;
      }
      label {
        gap: 4px;
        font-size: 11px;
      }
      input[type="number"] { display: none; }
      .mobile-range { display: block; }
      .param-head { font-size: 11px; }
      .param-value { font-size: 12px; }
      input[type="range"] {
        height: 24px;
        touch-action: pan-y;
      }
      input[type="range"]::-webkit-slider-thumb {
        width: 24px;
        height: 24px;
      }
      .dense-wrap { grid-column: 1 / -1; }
      .checklabel {
        min-height: 34px;
        padding: 6px 8px;
        justify-content: flex-start;
        font-size: 13px;
        border-radius: 8px;
      }
      .plot-wrap { min-height: 330px; padding: 8px; }
      .note { padding: 0 12px 12px; font-size: 11px; }
    }
  </style>
</head>
<body>
<main>
  <section class="card">
    <header>
      <h1>Function graph</h1>
      <p class="formula" aria-label="x of y equals a y natural logarithm of y minus b over 36 times exponential of minus the quantity 36 y minus c over e raised to m">
        <span>x(y) = a y ln(y) −</span>
        <span class="frac"><span class="top">b</span><span class="bottom">36</span></span>
        <span>· exp</span>
        <span class="bracket">[</span>
        <span>−(36y −</span>
        <span class="frac"><span class="top">c</span><span class="bottom">e</span></span>
        <span>)<sup>m</sup></span>
        <span class="bracket">]</span>
      </p>
    </header>

    <div class="controls">
      <label>
        <span class="param-head"><span>a</span><output id="aValue" class="param-value">3</output></span>
        <input id="a" type="number" value="3" min="0.1" step="0.1">
        <input id="aRange" class="mobile-range" type="range" min="0.1" max="10" value="3" step="0.1" aria-label="a">
      </label>
      <label>
        <span class="param-head"><span>b</span><output id="bValue" class="param-value">1</output></span>
        <input id="b" type="number" value="1" min="0.1" step="0.1">
        <input id="bRange" class="mobile-range" type="range" min="0.1" max="10" value="1" step="0.1" aria-label="b">
      </label>
      <label>
        <span class="param-head"><span>c</span><output id="cValue" class="param-value">36</output></span>
        <input id="c" type="number" value="36" min="0.1" step="0.1">
        <input id="cRange" class="mobile-range" type="range" min="0.1" max="72" value="36" step="0.1" aria-label="c">
      </label>
      <label>
        <span class="param-head"><span>m (even)</span><output id="mValue" class="param-value">4</output></span>
        <input id="m" type="number" value="4" min="2" step="2">
        <input id="mRange" class="mobile-range" type="range" min="2" max="20" value="4" step="2" aria-label="m, even integer">
      </label>
      <label class="dense-wrap">
        Dense grid
        <span class="checklabel"><input id="denseGrid" type="checkbox">Enable</span>
      </label>
    </div>

    <div class="plot-wrap" id="plotWrap">
      <canvas id="plot"></canvas>
      <div class="tooltip" id="tooltip"></div>
    </div>
    <div class="note">
      <a href="https://ko-fi.com/sphere_homotopy" target="_blank" rel="noopener noreferrer">Support me on Ko-fi</a>
    </div>
  </section>
</main>

<script>
(() => {
  "use strict";

  const BASE_DENOM = 36;
  const BASE_MULT = 36;
  const Y_MIN = 0.005;
  const Y_MAX = 1.2;

  const canvas = document.getElementById("plot");
  const ctx = canvas.getContext("2d");
  const wrap = document.getElementById("plotWrap");
  const tooltip = document.getElementById("tooltip");
  const denseGridInput = document.getElementById("denseGrid");
  const parameterIds = ["a", "b", "c", "m"];
  const inputs = parameterIds.map(id => document.getElementById(id));
  const ranges = parameterIds.map(id => document.getElementById(`${id}Range`));
  const values = Object.fromEntries(parameterIds.map(id => [id, document.getElementById(`${id}Value`)]));

  const state = {
    zoom: 1,
    segments: [],
    points: [],
    bounds: null,
    params: null
  };

  function css(name) {
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  }

  function normalizeEvenInteger(value, fallback = 4) {
    let n = Number(value);
    if (!Number.isFinite(n)) return fallback;
    n = Math.round(n / 2) * 2;
    if (n < 2) n = 2;
    return n;
  }

  function numValue(id, fallback) {
    const n = Number(document.getElementById(id).value);
    return Number.isFinite(n) ? n : fallback;
  }

  function setParameter(id, rawValue, source) {
    const numberInput = document.getElementById(id);
    const rangeInput = document.getElementById(`${id}Range`);
    let value = Number(rawValue);
    if (!Number.isFinite(value)) return;
    if (id === "m") value = normalizeEvenInteger(value, 4);
    else value = Math.max(0.1, value);
    numberInput.value = String(value);
    if (source !== rangeInput) {
      const min = Number(rangeInput.min);
      const max = Number(rangeInput.max);
      rangeInput.value = String(Math.min(max, Math.max(min, value)));
    }
    values[id].value = String(value);
  }

  function readParams() {
    const a = Math.max(0.1, numValue("a", 3));
    const b = Math.max(0.1, numValue("b", 1));
    const c = Math.max(0.1, numValue("c", 36));
    const m = normalizeEvenInteger(document.getElementById("m").value, 4);
    document.getElementById("m").value = String(m);
    return { a, b, c, m, denseGrid: denseGridInput.checked };
  }

  function f(y, {a, b, c, m}) {
    const core = BASE_MULT * y - c / Math.E;
    const value = a * y * Math.log(y) - (b / BASE_DENOM) * Math.exp(-Math.pow(core, m));
    return Number.isFinite(value) ? value : NaN;
  }

  function resize() {
    const rect = canvas.getBoundingClientRect();
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    canvas.width = Math.round(rect.width * dpr);
    canvas.height = Math.round(rect.height * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    draw();
  }

  function drawMessage(w, h, text) {
    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = css("--muted");
    ctx.font = "16px system-ui, sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(text, w / 2, h / 2);
  }

  function drawGridLineVertical(x, sx, margin, ph, style, width = 1) {
    ctx.strokeStyle = style;
    ctx.lineWidth = width;
    const px = sx(x);
    ctx.beginPath();
    ctx.moveTo(px, margin.top);
    ctx.lineTo(px, margin.top + ph);
    ctx.stroke();
  }

  function drawGridLineHorizontal(y, sy, margin, pw, style, width = 1) {
    ctx.strokeStyle = style;
    ctx.lineWidth = width;
    const py = sy(y);
    ctx.beginPath();
    ctx.moveTo(margin.left, py);
    ctx.lineTo(margin.left + pw, py);
    ctx.stroke();
  }

  function draw() {
    const p = readParams();
    state.params = p;

    const w = canvas.clientWidth;
    const h = canvas.clientHeight;
    const margin = { left: 60, right: 20, top: 20, bottom: 48 };
    const pw = w - margin.left - margin.right;
    const ph = h - margin.top - margin.bottom;

    ctx.clearRect(0, 0, w, h);

    const samples = Math.max(1800, Math.floor((pw + ph) * 2.8));
    const segments = [];
    const allPoints = [];
    let currentSegment = [];
    let minX = Infinity;
    let maxX = -Infinity;
    let minY = Infinity;
    let maxY = -Infinity;

    for (let i = 0; i <= samples; i++) {
      const y = Y_MIN + (Y_MAX - Y_MIN) * i / samples;
      const x = f(y, p);
      const valid = Number.isFinite(x) && x < 0;
      if (valid) {
        const point = { x, y };
        currentSegment.push(point);
        allPoints.push(point);
        if (x < minX) minX = x;
        if (x > maxX) maxX = x;
        if (y < minY) minY = y;
        if (y > maxY) maxY = y;
      } else if (currentSegment.length) {
        segments.push(currentSegment);
        currentSegment = [];
      }
    }
    if (currentSegment.length) segments.push(currentSegment);

    state.segments = segments;
    state.points = allPoints;

    if (!allPoints.length) {
      state.bounds = null;
      tooltip.style.display = "none";
      drawMessage(w, h, "No points with x(y) < 0 in the current range");
      return;
    }

    if (minX === maxX) { minX -= 1; maxX += 1; }
    if (minY === maxY) { minY -= 1; maxY += 1; }

    const rangeX = maxX - minX;
    const rangeY = maxY - minY;
    const centerX = (minX + maxX) / 2;
    const centerY = (minY + maxY) / 2;

    const baseUnitsPerPixelX = Math.max(
      rangeX / Math.max(pw, 1),
      2 * rangeY / Math.max(ph, 1)
    ) * 1.14;
    const unitsPerPixelX = baseUnitsPerPixelX / state.zoom;
    const unitsPerPixelY = unitsPerPixelX / 2;
    const drawRangeX = unitsPerPixelX * pw;
    const drawRangeY = unitsPerPixelY * ph;

    const viewMinX = centerX - drawRangeX / 2;
    const viewMaxX = centerX + drawRangeX / 2;
    const viewMinY = centerY - drawRangeY / 2;
    const viewMaxY = centerY + drawRangeY / 2;

    state.bounds = { margin, pw, ph, viewMinX, viewMaxX, viewMinY, viewMaxY };

    const sx = x => margin.left + (x - viewMinX) / (viewMaxX - viewMinX) * pw;
    const sy = y => margin.top + (viewMaxY - y) / (viewMaxY - viewMinY) * ph;

    ctx.fillStyle = css("--muted");
    ctx.font = window.innerWidth <= 760 ? "11px system-ui, sans-serif" : "12px system-ui, sans-serif";
    ctx.textBaseline = "middle";

    const majorXStep = 1;
    const majorYStep = 0.5;
    const minorXStep = 0.125;
    const minorYStep = 0.0625;

    if (p.denseGrid) {
      for (let x = Math.ceil(viewMinX / minorXStep) * minorXStep; x <= viewMaxX + minorXStep * 1e-6; x += minorXStep) {
        if (Math.abs(x / majorXStep - Math.round(x / majorXStep)) < 1e-9) continue;
        drawGridLineVertical(x, sx, margin, ph, css("--minor-grid"), 1);
      }
      for (let y = Math.ceil(viewMinY / minorYStep) * minorYStep; y <= viewMaxY + minorYStep * 1e-6; y += minorYStep) {
        if (Math.abs(y / majorYStep - Math.round(y / majorYStep)) < 1e-9) continue;
        drawGridLineHorizontal(y, sy, margin, pw, css("--minor-grid"), 1);
      }
    }

    for (let x = Math.ceil(viewMinX / majorXStep) * majorXStep; x <= viewMaxX + majorXStep * 1e-6; x += majorXStep) {
      drawGridLineVertical(x, sx, margin, ph, css("--grid"), 1.15);
      const px = sx(x);
      ctx.textAlign = "center";
      ctx.fillText(Number(x.toPrecision(6)).toString(), px, margin.top + ph + 18);
    }

    for (let y = Math.ceil(viewMinY / majorYStep) * majorYStep; y <= viewMaxY + majorYStep * 1e-6; y += majorYStep) {
      drawGridLineHorizontal(y, sy, margin, pw, css("--grid"), 1.15);
      const py = sy(y);
      ctx.textAlign = "right";
      ctx.fillText(Number(y.toPrecision(6)).toString(), margin.left - 8, py);
    }

    ctx.strokeStyle = css("--line");
    ctx.lineWidth = 1;
    ctx.strokeRect(margin.left, margin.top, pw, ph);

    if (viewMinX <= 0 && viewMaxX >= 0) {
      ctx.strokeStyle = css("--muted");
      ctx.lineWidth = 1.35;
      ctx.beginPath();
      ctx.moveTo(sx(0), margin.top);
      ctx.lineTo(sx(0), margin.top + ph);
      ctx.stroke();
    }
    if (viewMinY <= 0 && viewMaxY >= 0) {
      ctx.strokeStyle = css("--muted");
      ctx.lineWidth = 1.35;
      ctx.beginPath();
      ctx.moveTo(margin.left, sy(0));
      ctx.lineTo(margin.left + pw, sy(0));
      ctx.stroke();
    }

    ctx.save();
    ctx.beginPath();
    ctx.rect(margin.left, margin.top, pw, ph);
    ctx.clip();

    ctx.strokeStyle = css("--accent");
    ctx.lineWidth = 2.5;
    ctx.lineJoin = "round";
    ctx.lineCap = "round";

    for (const segment of segments) {
      if (!segment.length) continue;
      ctx.beginPath();
      ctx.moveTo(sx(segment[0].x), sy(segment[0].y));
      for (let i = 1; i < segment.length; i++) {
        ctx.lineTo(sx(segment[i].x), sy(segment[i].y));
      }
      ctx.stroke();
    }
    ctx.restore();

    ctx.fillStyle = css("--text");
    ctx.font = window.innerWidth <= 760 ? "600 12px system-ui, sans-serif" : "600 13px system-ui, sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("x(y)", margin.left + pw / 2, h - 12);

    ctx.save();
    ctx.translate(14, margin.top + ph / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.fillText("y", 0, 0);
    ctx.restore();
  }

  function showTooltip(event) {
    if (!state.bounds || !state.points.length) return;
    const rect = canvas.getBoundingClientRect();
    const mx = event.clientX - rect.left;
    const my = event.clientY - rect.top;
    const { margin, pw, ph, viewMinX, viewMaxX, viewMinY, viewMaxY } = state.bounds;

    if (mx < margin.left || mx > margin.left + pw || my < margin.top || my > margin.top + ph) {
      tooltip.style.display = "none";
      return;
    }

    const sx = x => margin.left + (x - viewMinX) / (viewMaxX - viewMinX) * pw;
    const sy = y => margin.top + (viewMaxY - y) / (viewMaxY - viewMinY) * ph;

    let best = null;
    let bestDist = Infinity;
    for (const point of state.points) {
      const dx = sx(point.x) - mx;
      const dy = sy(point.y) - my;
      const dist = dx * dx + dy * dy;
      if (dist < bestDist) {
        bestDist = dist;
        best = point;
      }
    }

    if (!best) {
      tooltip.style.display = "none";
      return;
    }

    tooltip.innerHTML = `x = ${best.x.toPrecision(7)}<br>y = ${best.y.toPrecision(7)}`;
    tooltip.style.left = `${mx}px`;
    tooltip.style.top = `${my}px`;
    tooltip.style.display = "block";
  }

  for (const input of inputs) {
    const update = () => {
      setParameter(input.id, input.value, input);
      state.zoom = 1;
      draw();
    };
    input.addEventListener("input", update);
    input.addEventListener("change", update);
  }

  for (const range of ranges) {
    range.addEventListener("input", () => {
      const id = range.id.replace(/Range$/, "");
      setParameter(id, range.value, range);
      state.zoom = 1;
      draw();
    });
  }

  for (const id of parameterIds) setParameter(id, document.getElementById(id).value);
  denseGridInput.addEventListener("change", draw);

  canvas.addEventListener("mousemove", showTooltip);
  canvas.addEventListener("mouseleave", () => tooltip.style.display = "none");
  canvas.addEventListener("wheel", event => {
    event.preventDefault();
    state.zoom *= event.deltaY < 0 ? 1.18 : 1 / 1.18;
    state.zoom = Math.min(30, Math.max(0.25, state.zoom));
    draw();
  }, { passive: false });

  window.addEventListener("resize", resize);
  new ResizeObserver(resize).observe(wrap);
  resize();
})();
</script>
</body>
</html>
