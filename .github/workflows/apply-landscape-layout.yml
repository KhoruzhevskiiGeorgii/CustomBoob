name: Apply landscape mobile layout

on:
  push:
    paths:
      - '.github/workflows/apply-landscape-layout.yml'

permissions:
  contents: write

jobs:
  update-layout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch index.html
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          if '    .workspace {' not in text:
              text = text.replace(
                  '    .controls {\n      display: grid;',
                  '    .workspace { min-width: 0; }\n    .controls {\n      display: grid;',
                  1,
              )

          landscape_css = r'''
    @media (orientation: landscape) and (max-height: 600px) and (pointer: coarse) {
      body { min-height: 100dvh; overflow: hidden; }
      main {
        width: calc(100% - 8px);
        height: calc(100dvh - 8px);
        margin: 4px auto;
      }
      .card {
        height: 100%;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        border-radius: 12px;
      }
      header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 7px 10px;
      }
      h1 {
        margin: 0;
        flex: 0 0 auto;
        font-size: 14px;
        line-height: 1;
      }
      .formula {
        min-width: 0;
        gap: 2px;
        flex-wrap: nowrap;
        white-space: nowrap;
        font-size: 12.5px;
        line-height: 1;
      }
      .workspace {
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(190px, 30vw) minmax(0, 1fr);
      }
      .controls {
        min-height: 0;
        grid-template-columns: 1fr;
        grid-auto-rows: min-content;
        align-content: center;
        gap: 5px;
        padding: 7px 9px;
        overflow-y: auto;
        border-right: 1px solid var(--line);
        border-bottom: 0;
      }
      label {
        gap: 2px;
        font-size: 10px;
        line-height: 1;
      }
      .param-head { font-size: 10px; }
      .param-value { font-size: 11px; }
      input[type="number"] { display: none; }
      .mobile-range {
        display: block;
        height: 18px;
        touch-action: pan-y;
      }
      input[type="range"]::-webkit-slider-thumb {
        width: 22px;
        height: 22px;
      }
      .dense-wrap { grid-column: auto; }
      .checklabel {
        min-height: 26px;
        justify-content: flex-start;
        padding: 3px 6px;
        border-radius: 7px;
        font-size: 11px;
      }
      .checklabel input[type="checkbox"] {
        width: 15px;
        height: 15px;
      }
      .plot-wrap {
        min-width: 0;
        min-height: 0;
        height: auto;
        padding: 5px;
      }
      .note {
        padding: 3px 10px 5px;
        text-align: center;
        font-size: 10px;
        line-height: 1.15;
      }
    }
'''
          if '@media (orientation: landscape) and (max-height: 600px)' not in text:
              text = text.replace('  </style>', landscape_css + '  </style>', 1)

          if '<div class="workspace">' not in text:
              text = text.replace(
                  '    <div class="controls">',
                  '    <div class="workspace">\n    <div class="controls">',
                  1,
              )
              text = text.replace(
                  '    <div class="note">',
                  '    </div>\n    <div class="note">',
                  1,
              )

          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit changes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add index.html
          git diff --cached --quiet || git commit -m "Optimize landscape phone layout"
          git push
